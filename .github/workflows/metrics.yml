name: Professional Profile Actions

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: jadenjin
          outputs: |
            generated/github-snake.svg
            generated/github-snake-dark.svg?palette=github-dark

      - name: Prepare publish directory
        run: |
          rm -rf dist
          mkdir -p dist

          sudo cp generated/github-snake.svg dist/github-snake.svg
          sudo cp generated/github-snake-dark.svg dist/github-snake-dark.svg

          sudo chown -R "$USER:$USER" dist
          ls -la dist

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true
